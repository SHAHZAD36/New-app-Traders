name: chaudhary_traders
description: A production-ready Android application for a snack distribution business.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.3.6
  sqflite: ^2.3.0
  path: ^1.8.3
  intl: ^0.18.1
  pdf: ^3.10.4
  printing: ^5.11.0
  excel: ^2.1.0
  share_plus: ^7.1.0
  fl_chart: ^0.63.0
  local_auth: ^2.1.6
  shared_preferences: ^2.2.0
  path_provider: ^2.1.1
  google_fonts: ^5.1.0
  font_awesome_flutter: ^10.5.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lang/
