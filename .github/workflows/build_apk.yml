name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create fresh Flutter project
        run: |
          flutter create --org com.chaudhary.traders --project-name chaudhary_traders temp_project
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/
          cp -r assets temp_project/ 2>/dev/null || true

      - name: Get dependencies
        working-directory: temp_project
        run: flutter pub get

      - name: Build APK
        working-directory: temp_project
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chaudhary-traders-apk
          path: temp_project/build/app/outputs/flutter-apk/app-debug.apk
