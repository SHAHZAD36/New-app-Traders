name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Fix repository imports
        run: |
          cat > lib/features/expenses/domain/repositories/expense_repository.dart << 'EOF'
          import '../../data/models/expense_model.dart';
          abstract class ExpenseRepository {
            Future<List<ExpenseModel>> getExpenses();
            Future<int> addExpense(ExpenseModel expense);
            Future<void> deleteExpense(int id);
          }
          EOF

          cat > lib/features/purchases/domain/repositories/purchase_repository.dart << 'EOF'
          import '../../data/models/purchase_model.dart';
          abstract class PurchaseRepository {
            Future<List<PurchaseModel>> getPurchases();
            Future<int> addPurchase(PurchaseModel p);
          }
          EOF

          cat > lib/features/collections/domain/repositories/collection_repository.dart << 'EOF'
          import '../../data/models/collection_model.dart';
          abstract class CollectionRepository {
            Future<List<CollectionModel>> getCollections();
            Future<int> addCollection(CollectionModel c);
          }
          EOF

          cat > lib/features/cash_book/domain/repositories/cash_book_repository.dart << 'EOF'
          import '../../data/models/cash_book_model.dart';
          abstract class CashBookRepository {
            Future<List<CashBookModel>> getEntries();
            Future<int> addEntry(CashBookModel e);
          }
          EOF

      - name: Create fresh Flutter project
        run: |
          flutter create --org com.chaudhary.traders --project-name chaudhary_traders temp_project
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/
          cp -r assets temp_project/ 2>/dev/null || true

      - name: Get dependencies
        working-directory: temp_project
        run: flutter pub get

      - name: Build APK
        working-directory: temp_project
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chaudhary-traders-apk
          path: temp_project/build/app/outputs/flutter-apk/app-debug.apk
