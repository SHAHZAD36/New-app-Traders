name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Fix all import issues
        run: |
          # Fix new_sale_screen.dart import
          sed -i "s|import '../models/sale_model.dart'|import '../../data/models/sale_model.dart'|g" lib/features/sales/presentation/screens/new_sale_screen.dart

          # Fix domain repository files
          printf "import '../../data/models/expense_model.dart';\nabstract class ExpenseRepository {\n  Future<List<ExpenseModel>> getExpenses();\n  Future<int> addExpense(ExpenseModel expense);\n  Future<void> deleteExpense(int id);\n}\n" > lib/features/expenses/domain/repositories/expense_repository.dart

          printf "import '../../data/models/purchase_model.dart';\nabstract class PurchaseRepository {\n  Future<List<PurchaseModel>> getPurchases();\n  Future<int> addPurchase(PurchaseModel p);\n}\n" > lib/features/purchases/domain/repositories/purchase_repository.dart

          printf "import '../../data/models/collection_model.dart';\nabstract class CollectionRepository {\n  Future<List<CollectionModel>> getCollections();\n  Future<int> addCollection(CollectionModel c);\n}\n" > lib/features/collections/domain/repositories/collection_repository.dart

          printf "import '../../data/models/cash_book_model.dart';\nabstract class CashBookRepository {\n  Future<List<CashBookModel>> getEntries();\n  Future<int> addEntry(CashBookModel e);\n}\n" > lib/features/cash_book/domain/repositories/cash_book_repository.dart

      - name: Create fresh Flutter project
        run: |
          flutter create --org com.chaudhary.traders --project-name chaudhary_traders temp_project
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/
          cp -r assets temp_project/ 2>/dev/null || true

      - name: Get dependencies
        working-directory: temp_project
        run: flutter pub get

      - name: Build APK
        working-directory: temp_project
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chaudhary-traders-apk
          path: temp_project/build/app/outputs/flutter-apk/app-debug.apk
